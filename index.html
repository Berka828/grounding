<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gentle Playroom - Sensory Magic</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #webcam { transform: scaleX(-1); display: none; }
        
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #ffffff; z-index: 100; color: #333; text-align: center;
        }
        button {
            padding: 20px 50px; font-size: 20px; cursor: pointer; letter-spacing: 1px;
            background-color: #3498db; color: white; border: none; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); transition: 0.3s;
        }
        button:hover { background-color: #2980b9; transform: scale(1.05); }
        #log { margin-top: 20px; font-family: monospace; color: #888; }
        
        .dg.ac { z-index: 50 !important; transition: opacity 0.3s; }
        body.fullscreen .dg.ac { opacity: 0; pointer-events: none; }
        body.fullscreen #ui { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>
    <div id="ui">
        <h1 style="letter-spacing: 2px; font-weight: 300;">GENTLE PLAYROOM</h1>
        <p style="color: #666; margin-bottom: 30px;">Interact with a world of gentle magic.</p>
        <button onclick="startApp()">START EXPERIENCE</button>
        <div id="log">Sensors Calibrated</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <video id="webcam" playsinline autoplay muted></video>

    <script>
        var log = document.getElementById('log');
        var video = document.getElementById('webcam');
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');

        var objects = [], motionPoints = [], popExplosions = [], ripples = [], splashes = []; 
        var lastFrame = null, engineBooted = false;
        var activeInteractionMode = 'Launch'; 
        var modeNotification = { text: '', life: 0 }; 

        var audioCtx;
        var pentatonicScale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33]; 

        var magicMeter = 0;
        var magicEventActive = false;
        var magicEventTimer = 0;
        var confetti = [];
        var sonicRings = []; // NEW: Array for the sonic ring explosion

        // NEW: BxCM Vibrant Brand Colors for Leaves (Purple, Orange, Cyan, Lime, Magenta)
        var bxcmHues = [280, 30, 190, 90, 330];

        // FULLY EXPANDED SETTINGS
        var settings = {
            interactionMode: 'Random', 
            objectCount: 15, 
            floorLevel: 0.95,       // NEW: Lowered floor default
            magicFillSpeed: 1.0,    // NEW: Multiplier for thermometer
            soundEnabled: true,     // NEW: Sound toggle
            gravity: 0.2, 
            kickPower: 8,
            bgColor: '#f9f9fb', 
            cameraAlpha: 0.2, 
            cameraBlur: 4,
            indicatorColor: '#ffffff', 
            indicatorSize: 30,
            puddleSize: 120 
        };

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playChime() {
            if (!settings.soundEnabled || !audioCtx) return; // Honors the sound toggle
            var freq = pentatonicScale[Math.floor(Math.random() * pentatonicScale.length)];
            var osc = audioCtx.createOscillator();
            var gainNode = audioCtx.createGain();
            
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5); 
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        function addMagic(amount) {
            if (magicEventActive) return; 
            magicMeter += amount * settings.magicFillSpeed; // Applies the custom fill speed
            if (magicMeter >= 100) triggerMagicEvent();
        }

        function triggerMagicEvent() {
            magicMeter = 100;
            magicEventActive = true;
            magicEventTimer = 300; 
            
            sonicRings = [];
            confetti = [];
            
            // Initial burst of sonic rings
            for (let i = 0; i < 4; i++) {
                createSonicRing(i * 40);
            }

            // Confetti
            for (let i = 0; i < 150; i++) {
                confetti.push({
                    x: Math.random() * canvas.width, y: -Math.random() * canvas.height, 
                    vx: (Math.random() - 0.5) * 4, vy: Math.random() * 3 + 2,
                    color: Math.random() > 0.5 ? '#FFD700' : '#FFA500', 
                    size: Math.random() * 8 + 6, rotation: Math.random() * Math.PI * 2, rs: (Math.random() - 0.5) * 0.2
                });
            }
        }

        function createSonicRing(startRadius = 10) {
            sonicRings.push({
                x: canvas.width / 2, y: canvas.height / 2,
                radius: startRadius,
                color: `hsl(${Math.random() * 360}, 100%, 55%)`,
                thickness: Math.random() * 20 + 15,
                life: 1.0
            });
        }

        function startApp() {
            log.innerText = "Initializing sensory sensors...";
            initAudio(); 
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                video.srcObject = stream;
                video.play().catch(()=>{});
                var checkInterval = setInterval(() => {
                    if (video.videoWidth > 0 && !engineBooted) {
                        clearInterval(checkInterval);
                        engineBooted = true;
                        document.getElementById('ui').style.display = 'none';
                        initGame();
                    }
                }, 100);
            }).catch(err => { log.innerText = "Error: " + err.name; });
        }

        function initGame() {
            try {
                var gui = new dat.GUI();
                
                // COMPREHENSIVE SETTINGS MENUS
                var mainFolder = gui.addFolder('Main Gameplay');
                mainFolder.add(settings, 'interactionMode', ['Launch', 'Pop', 'Random']).name('Ball Mode');
                mainFolder.add(settings, 'objectCount', 5, 40).name('Total Objects').onFinishChange(resetObjects);
                mainFolder.add(settings, 'floorLevel', 0.5, 1.0).name('Floor Height');
                mainFolder.add(settings, 'soundEnabled').name('Sound ON/OFF');
                mainFolder.open();

                var magicFolder = gui.addFolder('Magic & Physics');
                magicFolder.add(settings, 'magicFillSpeed', 0.1, 5.0).name('Fill Speed');
                magicFolder.add(settings, 'gravity', 0.05, 0.5).name('Gravity');
                magicFolder.add(settings, 'kickPower', 2, 20).name('Impact Force');
                
                var envFolder = gui.addFolder('Environment');
                envFolder.addColor(settings, 'bgColor').name('Room Hue');
                envFolder.add(settings, 'puddleSize', 50, 300).name('Puddle Base Size');

                var mirrorFolder = gui.addFolder('Camera Mirror');
                mirrorFolder.add(settings, 'cameraAlpha', 0, 1).name('Visibility');
                mirrorFolder.add(settings, 'cameraBlur', 0, 20).name('Softness');
                
                var touchFolder = gui.addFolder('Touch Points');
                touchFolder.addColor(settings, 'indicatorColor').name('Color');
                touchFolder.add(settings, 'indicatorSize', 5, 60).name('Size');
            } catch(e) {}

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            document.addEventListener('fullscreenchange', () => {
                if (document.fullscreenElement) document.body.classList.add('fullscreen');
                else document.body.classList.remove('fullscreen');
            });
            
            setInterval(cycleInteractionMode, 20000); 
            showModeChangeNotification(settings.interactionMode === 'Random' ? 'Launch' : settings.interactionMode); 

            resetObjects();
            trackMotion();
            gameLoop();
        }

        function cycleInteractionMode() { 
            if (settings.interactionMode === 'Random') {
                activeInteractionMode = (activeInteractionMode === 'Launch') ? 'Pop' : 'Launch';
                showModeChangeNotification(activeInteractionMode);
            }
        }
        
        function showModeChangeNotification(mode) { 
            modeNotification.text = `Ball Mode: ${mode}`;
            modeNotification.life = 1.0;
        }

        function trackMotion() {
            var mCanvas = document.createElement('canvas');
            var mCtx = mCanvas.getContext('2d', { willReadFrequently: true });
            mCanvas.width = 64; mCanvas.height = 48;

            function scan() {
                if (video.readyState < 3) { setTimeout(scan, 100); return; }
                mCtx.drawImage(video, 0, 0, 64, 48);
                var current = mCtx.getImageData(0, 0, 64, 48).data;
                
                let rawMotion = [];
                motionPoints = []; 

                if (lastFrame) {
                    for (var i = 0; i < current.length; i += 4) {
                        if (Math.abs(current[i] - lastFrame[i]) > 45) {
                            var x = (1.0 - (((i/4) % 64) / 64)) * canvas.width;
                            var yPerc = (Math.floor(i/4/64))/48;
                            var y = yPerc * canvas.height;
                            rawMotion.push({ x: x, y: y });
                        }
                    }
                    
                    if (rawMotion.length > 0) {
                        let topPt = rawMotion[0], bottomPt = rawMotion[0];
                        let leftPt = rawMotion[0], rightPt = rawMotion[0];
                        
                        rawMotion.forEach(p => {
                            if (p.y < topPt.y) topPt = p;       
                            if (p.y > bottomPt.y) bottomPt = p; 
                            if (p.x < leftPt.x) leftPt = p;     
                            if (p.x > rightPt.x) rightPt = p;   
                        });
                        
                        motionPoints.push(topPt, bottomPt, leftPt, rightPt);

                        motionPoints.forEach(pt => {
                            objects.forEach((obj, index) => {
                                if (!obj) return;
                                var dx = obj.x - pt.x, dy = obj.y - pt.y;
                                
                                if (Math.sqrt(dx*dx + dy*dy) < (obj.radius || settings.indicatorSize) + 30) {
                                    switch(obj.type) {
                                        case 'ball':
                                            if (activeInteractionMode === 'Launch') {
                                                obj.vy = -settings.kickPower;
                                                obj.vx = (obj.x - pt.x) * 0.15;
                                                addMagic(2); 
                                            } else { 
                                                createPopExplosion(obj.x, obj.y, obj.colorHue);
                                                objects[index] = createObject();
                                                addMagic(5); 
                                            }
                                            break;
                                        case 'leaf':
                                            obj.vy = -settings.kickPower * 0.5;
                                            obj.vx += (obj.x - pt.x) * 0.1;
                                            addMagic(1); 
                                            break;
                                        case 'puddle':
                                            if (obj.cooldown <= 0) {
                                                obj.colorHue = Math.floor(Math.random() * 360); 
                                                obj.isColorful = true;
                                                ripples.push({x: obj.x, y: obj.y, radius: 20, life: 1.0, hue: obj.colorHue});
                                                createSplash(obj.x, obj.y, obj.colorHue);
                                                playChime(); 
                                                addMagic(4); 
                                                obj.cooldown = 30; 
                                            }
                                            break;
                                    }
                                }
                            });
                        });
                    }
                }
                
                objects.forEach(obj => { if (obj && obj.type === 'puddle' && obj.cooldown > 0) obj.cooldown--; });

                lastFrame = new Uint8ClampedArray(current);
                setTimeout(scan, 60);
            }
            scan();
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            
            if (settings.interactionMode !== 'Random' && activeInteractionMode !== settings.interactionMode) {
                 activeInteractionMode = settings.interactionMode;
                 showModeChangeNotification(activeInteractionMode);
            }

            ctx.fillStyle = settings.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawMirroredCamera();

            if (magicEventActive) {
                // Flash the room gently
                ctx.save();
                ctx.globalAlpha = (magicEventTimer / 300) * 0.3;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }

            drawTouchIndicators();
            drawMagicMeter(); 
            drawAndUpdateObjects(); 
            drawAndUpdatePops();
            drawAndUpdateSplashes(); 
            drawAndUpdateRipples(); 

            if (magicEventActive) {
                // Pulse new rings periodically
                if (magicEventTimer % 25 === 0) createSonicRing();
                
                drawAndUpdateSonicRings();
                drawAndUpdateConfetti();
                
                magicEventTimer--;
                if (magicEventTimer <= 0) {
                    magicEventActive = false;
                    magicMeter = 0; 
                }
            }

            drawNotifications();
        }

        // --- UPDATED: Gradient Thermometer ---
        function drawMagicMeter() {
            var barWidth = 25;
            var barHeight = canvas.height * 0.5;
            var x = 30; 
            var y = (canvas.height / 2) - (barHeight / 2);

            ctx.strokeStyle = 'rgba(200, 200, 200, 0.4)';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, barWidth, barHeight);

            var fillHeight = (magicMeter / 100) * barHeight;
            var fillY = y + barHeight - fillHeight;

            // Create Red to Green Gradient
            var grad = ctx.createLinearGradient(x, y + barHeight, x, y);
            grad.addColorStop(0, '#ff4444');    // Red at bottom
            grad.addColorStop(0.5, '#ffeb3b');  // Yellow in middle
            grad.addColorStop(1, '#00C851');    // Green at top

            ctx.save();
            ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
            ctx.shadowBlur = 10;
            ctx.fillStyle = grad;
            ctx.fillRect(x, fillY, barWidth, fillHeight);
            ctx.restore();
        }

        // --- NEW: Sonic Rings Drawing Logic ---
        function drawAndUpdateSonicRings() {
            for (let i = sonicRings.length - 1; i >= 0; i--) {
                let r = sonicRings[i];
                r.radius += 20; // Expands outward quickly
                r.life -= 0.015; // Fades out
                
                if (r.life <= 0) {
                    sonicRings.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = r.life;
                    ctx.strokeStyle = r.color;
                    ctx.lineWidth = r.thickness;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }

        function drawAndUpdateConfetti() {
             for (let i = 0; i < confetti.length; i++) {
                let c = confetti[i];
                c.x += c.vx; c.y += c.vy; c.rotation += c.rs;
                ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.rotation);
                ctx.globalAlpha = (magicEventTimer < 60) ? magicEventTimer / 60 : 1.0; 
                ctx.fillStyle = c.color; ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size * 0.6); ctx.restore();
                if (c.x < 0) c.x = canvas.width; if (c.x > canvas.width) c.x = 0;
            }
        }

        function drawAndUpdateObjects() {
             var floorY = canvas.height * settings.floorLevel; // Dynamic Floor
             objects.forEach((obj, i) => {
                if (!obj) return;
                
                switch(obj.type) {
                    case 'ball': updateBall(obj, floorY); break;
                    case 'leaf': updateLeaf(obj, floorY); break;
                    case 'puddle': updatePuddle(obj, floorY); break;
                }

                ctx.save();
                switch(obj.type) {
                    case 'ball': drawBall(obj, floorY); break;
                    case 'leaf': drawLeaf(obj, floorY); break;
                    case 'puddle': drawPuddle(obj, floorY); break;
                }
                ctx.restore();

                if (obj.y > canvas.height + 50) {
                    objects[i] = createObject();
                }
            });
        }
        
        function updateBall(o, floorY) {
            o.vy += settings.gravity; o.x += o.vx; o.y += o.vy; o.vx *= 0.94; o.vy *= 0.94;
            if (o.y + o.radius > floorY) { o.y = floorY - o.radius; o.vy *= -0.4; }
        }
        function drawBall(o, floorY) {
            ctx.fillStyle = 'rgba(0,0,0,0.06)'; ctx.beginPath(); ctx.ellipse(o.x, floorY, o.radius, o.radius * 0.2, 0, 0, 2*Math.PI); ctx.fill();
            var grd = ctx.createRadialGradient(o.x-o.radius*0.3, o.y-o.radius*0.3, o.radius*0.1, o.x, o.y, o.radius);
            grd.addColorStop(0, `hsl(${o.colorHue}, 80%, 85%)`); grd.addColorStop(1, `hsl(${o.colorHue}, 70%, 40%)`);
            ctx.beginPath(); ctx.arc(o.x, o.y, o.radius, 0, 2*Math.PI); ctx.fillStyle = grd; ctx.fill();
        }

        function updateLeaf(o, floorY) {
            o.vy += settings.gravity * 0.2; o.vx += (Math.random() - 0.5) * 0.2; o.x += o.vx; o.y += o.vy;
            o.vx *= 0.96; o.vy *= 0.98; o.rotation += o.rotationSpeed;
            if (o.y + o.radius > floorY) { o.y = floorY - o.radius; o.vy = 0; o.vx *= 0.8; }
        }
        function drawLeaf(o, floorY) {
            ctx.translate(o.x, o.y); ctx.rotate(o.rotation); ctx.fillStyle = `hsl(${o.colorHue}, 70%, 55%)`; // Brighter leaf saturation
            ctx.beginPath(); ctx.moveTo(0, -o.radius); ctx.quadraticCurveTo(o.radius, 0, 0, o.radius);
            ctx.quadraticCurveTo(-o.radius, 0, 0, -o.radius); ctx.fill();
        }

        function updatePuddle(o, floorY) { o.y = floorY; }
        function drawPuddle(o, floorY) {
            let fillStyle = o.isColorful ? `hsla(${o.colorHue}, 80%, 60%, 0.4)` : 'rgba(100, 180, 255, 0.3)';
            ctx.fillStyle = fillStyle; ctx.beginPath(); ctx.ellipse(o.x, o.y, o.radius, o.radius * 0.3, 0, 0, 2 * Math.PI); ctx.fill();
        }

        function drawAndUpdateRipples() {
            for (let i = ripples.length - 1; i >= 0; i--) {
                let r = ripples[i]; r.radius += 2.0; r.life -= 0.02;
                if (r.life <= 0) ripples.splice(i, 1);
                else { ctx.strokeStyle = `hsla(${r.hue}, 80%, 60%, ${r.life})`; ctx.lineWidth = 4; ctx.beginPath(); ctx.ellipse(r.x, r.y, r.radius, r.radius * 0.3, 0, 0, 2 * Math.PI); ctx.stroke(); }
            }
        }
        
        function createSplash(x, y, hue) {
            var numSplashes = Math.floor(Math.random() * 15) + 5; 
            for (let i = 0; i < numSplashes; i++) {
                var angle = -Math.PI/2 + (Math.random() - 0.5) * 1.5, speed = Math.random() * 8 + 3; 
                splashes.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, hue: hue, size: Math.random() * 4 + 2 });
            }
        }
        
        function drawAndUpdateSplashes() {
            for (let i = splashes.length - 1; i >= 0; i--) {
                let s = splashes[i]; s.x += s.vx; s.y += s.vy; s.vy += settings.gravity * 0.8; s.life -= 0.03;
                if (s.life <= 0) splashes.splice(i, 1);
                else { ctx.fillStyle = `hsla(${s.hue}, 80%, 60%, ${s.life})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); }
            }
        }

        function resetObjects() {
            objects = [];
            for (var i = 0; i < settings.objectCount; i++) objects.push(createObject());
        }

        function createObject() {
            var floorY = canvas.height * settings.floorLevel; 
            var objectType = ['ball', 'leaf', 'puddle'][Math.floor(Math.random() * 3)];
            
            let newObj = {
                type: objectType, x: Math.random() * canvas.width,
                y: Math.random() * floorY * 0.8, vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
                radius: Math.random() * 20 + 30, cooldown: 0 
            };

            switch(objectType) {
                case 'ball':
                    newObj.colorHue = Math.floor(Math.random() * 360);
                    break;
                case 'leaf':
                    // UPDATED: Now uses BxCM-style branding colors!
                    newObj.colorHue = bxcmHues[Math.floor(Math.random() * bxcmHues.length)];
                    newObj.rotation = Math.random() * Math.PI * 2;
                    newObj.rotationSpeed = (Math.random() - 0.5) * 0.04;
                    break;
                case 'puddle':
                    newObj.y = floorY; 
                    newObj.radius = Math.random() * 40 + settings.puddleSize; 
                    newObj.isColorful = false; 
                    newObj.colorHue = 210; 
                    break;
            }
            return newObj;
        }

        function drawMirroredCamera() { 
            ctx.save(); ctx.globalAlpha = settings.cameraAlpha; ctx.filter = `blur(${settings.cameraBlur}px)`;
            ctx.scale(-1, 1); ctx.translate(-canvas.width, 0);
            if (video.readyState >= 3) ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();
        }
        
        function drawTouchIndicators() { 
            motionPoints.forEach(p => {
                var grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, settings.indicatorSize * 1.5);
                grad.addColorStop(0, settings.indicatorColor + '66'); grad.addColorStop(1, settings.indicatorColor + '00');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x, p.y, settings.indicatorSize * 1.5, 0, 2*Math.PI); ctx.fill();
            });
        }
        
        function createPopExplosion(x, y, hue) { 
            var numParticles = 30;
            for (let i = 0; i < numParticles; i++) {
                var angle = (i/numParticles) * 2 * Math.PI, speed = Math.random() * settings.kickPower * 0.5 + 1;
                popExplosions.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, hue, lightness: 70 + Math.random() * 20 });
            }
        }
        
        function drawAndUpdatePops() { 
            for (let i = popExplosions.length - 1; i >= 0; i--) {
                let p = popExplosions[i]; p.x += p.vx; p.y += p.vy; p.vy += settings.gravity * 0.5; p.life -= 0.03;
                if (p.life <= 0) popExplosions.splice(i, 1);
                else { ctx.fillStyle = `hsla(${p.hue}, 80%, ${p.lightness}%, ${p.life})`; ctx.fillRect(p.x, p.y, 4, 4); }
            }
        }
        
        function drawNotifications() { 
             if (document.fullscreenElement) return; 
             if (modeNotification.life > 0) {
                modeNotification.life -= 0.01; ctx.save(); ctx.globalAlpha = Math.min(1, modeNotification.life * 3); 
                ctx.fillStyle = '#333333'; ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(modeNotification.text, canvas.width / 2, 50); ctx.restore();
            }
        }
        
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        
        document.addEventListener('keydown', e => { 
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
