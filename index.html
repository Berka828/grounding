<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BxCM Interactive Playroom - Pro</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #webcam { display: none; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #f0f4f8; z-index: 100; color: #333; text-align: center;
        }
        button {
            padding: 20px 50px; font-size: 20px; cursor: pointer;
            background-color: #3498db; color: white; border: none; border-radius: 5px;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
        #log { margin-top: 20px; font-family: monospace; color: #888; }
        .dg.ac { z-index: 50 !important; }
        body.kiosk-mode { cursor: none; }
        body.kiosk-mode .dg.ac { opacity: 0; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>
    <div id="ui">
        <h1>INTERACTIVE PLAYROOM</h1>
        <button onclick="startApp()">START EXPERIENCE</button>
        <div id="log">Sensors Ready</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <video id="webcam" playsinline autoplay muted></video>

    <script>
        var log = document.getElementById('log');
        var video = document.getElementById('webcam');
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');

        var objects = [];
        var skyParticles = [];
        var floorSplatter = [];
        var lastFrame = null;
        var engineBooted = false;
        var gravityWells = [];
        var handRaiseTimer = 0;
        var logoImg = new Image();
        logoImg.src = 'BxCM_Logo_FullColor_dark-backgrounds.png';

        var settings = {
            bgColor: '#ffffff',
            kickPower: 15,
            objectMix: 'Full Mix',
            ballCount: 5,
            leafCount: 5,
            puddleCount: 4,
            skyMode: 'Rainbow Trail',
            logoOpacity: 0.05,
        };
        
        var BxCM_COLORS = ['#f7b71d', '#f07c28', '#00a7e1', '#9e2984', '#388f48'];

        function startApp() {
            log.innerText = "Requesting camera...";
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    video.srcObject = stream;
                    video.play().catch(function(){});
                    var checkInterval = setInterval(function() {
                        if (video.readyState >= 3 && !engineBooted) {
                            clearInterval(checkInterval);
                            engineBooted = true;
                            document.getElementById('ui').style.display = 'none';
                            initGame();
                        }
                    }, 100);
                })
                .catch(function(err) {
                    log.innerText = "CAMERA ERROR: " + err.name;
                    log.style.color = "red";
                });
        }

        function initGame() {
            var gui = new dat.GUI();
            var fGeneral = gui.addFolder('General');
            fGeneral.addColor(settings, 'bgColor').name('Background Color');
            fGeneral.add(settings, 'logoOpacity', 0, 0.2).name('Logo Opacity');
            var fObjects = gui.addFolder('Floor Objects');
            fObjects.add(settings, 'objectMix', ['Balls Only', 'Leaves & Puddles', 'Full Mix']).name('Object Mix').onFinishChange(resetObjects);
            fObjects.add(settings, 'kickPower', 5, 30).name('Kick Strength');
            var fSky = gui.addFolder('Sky Interaction');
            fSky.add(settings, 'skyMode', ['Attractor', 'Rainbow Trail']).name('Sky Effect');
            fGeneral.open(); fObjects.open(); fSky.open();

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            resetObjects();
            trackMotion();
            gameLoop();
        }

        function resetObjects() {
            objects = [];
            if (settings.objectMix === 'Balls Only' || settings.objectMix === 'Full Mix') {
                for (var i = 0; i < settings.ballCount; i++) objects.push(createObject('ball'));
            }
            if (settings.objectMix === 'Leaves & Puddles' || settings.objectMix === 'Full Mix') {
                for (var i = 0; i < settings.leafCount; i++) objects.push(createObject('leaf'));
                for (var i = 0; i < settings.puddleCount; i++) objects.push(createObject('puddle'));
            }
        }

        function createObject(type) {
            var floor = canvas.height * 0.85;
            var newObj = {
                type: type,
                x: Math.random() * canvas.width,
                y: floor - 30, z: 0,
                vx: 0, vy: 0, vz: 0,
                growth: 0.1, isSquished: false,
                rotation: Math.random() * Math.PI * 2,
                color: BxCM_COLORS[Math.floor(Math.random() * BxCM_COLORS.length)]
            };
            if (type === 'ball') newObj.radius = Math.random() * 20 + 30;
            if (type === 'leaf') newObj.radius = Math.random() * 15 + 20;
            if (type === 'puddle') newObj.radius = Math.random() * 20 + 35;
            return newObj;
        }

        function trackMotion() {
            var mCanvas = document.createElement('canvas');
            var mCtx = mCanvas.getContext('2d', { willReadFrequently: true });
            mCanvas.width = 64; mCanvas.height = 48;
            
            function scan() {
                if (!engineBooted) { requestAnimationFrame(scan); return; }
                mCtx.drawImage(video, 0, 0, 64, 48);
                var current = mCtx.getImageData(0, 0, 64, 48).data;
                gravityWells = [];
                var highHandDetected = false;

                if (lastFrame) {
                    for (var i = 0; i < current.length; i += 4) {
                        if (Math.abs(current[i] - lastFrame[i]) > 40) {
                            var x = (1.0 - ((i / 4) % 64) / 64) * canvas.width;
                            var yPerc = (Math.floor(i / 4 / 64)) / 48;
                            var y = yPerc * canvas.height;
                            
                            if (yPerc < 0.6) { // Sky Zone
                                highHandDetected = true;
                                gravityWells.push({ x: x, y: y });
                            }
                            
                            if (yPerc > 0.7) { // Floor Zone
                                objects.forEach(function(obj) {
                                    var dx = obj.x - x;
                                    var dy = obj.y - y;
                                    if (Math.sqrt(dx*dx + dy*dy) < obj.radius + 50) {
                                        if (obj.type === 'ball' || obj.type === 'leaf') {
                                            obj.vz = 0.05;
                                            obj.vy = -settings.kickPower * (obj.type === 'leaf' ? 0.5 : 1.0);
                                            obj.vx = (obj.x - x) * 0.4;
                                        } else if (obj.type === 'puddle' && !obj.isSquished) {
                                            obj.isSquished = true;
                                            createFloorSplatter(obj.x, canvas.height * 0.85, obj.color);
                                        }
                                    }
                                });
                            }
                        }
                    }
                }
                
                if (highHandDetected) handRaiseTimer++; else handRaiseTimer = 0;
                lastFrame = new Uint8ClampedArray(current);
                setTimeout(scan, 50);
            }
            scan();
        }

        function createFloorSplatter(x, y, color) {
            var splatCount = 10;
            for (var i = 0; i < splatCount; i++) {
                floorSplatter.push({
                    x: x + (Math.random() - 0.5) * 80,
                    y: y + (Math.random() - 0.5) * 30,
                    radius: Math.random() * 20 + 10,
                    color: color,
                    alpha: Math.random() * 0.5 + 0.3,
                    life: 1.0
                });
            }
        }
        
        function gameLoop() {
            requestAnimationFrame(gameLoop);
            ctx.fillStyle = settings.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Subtle Logo
            if (logoImg.complete && settings.logoOpacity > 0) {
                ctx.globalAlpha = settings.logoOpacity;
                var logoAspect = logoImg.width / logoImg.height;
                var logoWidth = canvas.width * 0.4;
                var logoHeight = logoWidth / logoAspect;
                ctx.drawImage(logoImg, (canvas.width - logoWidth) / 2, (canvas.height - logoHeight) / 2, logoWidth, logoHeight);
                ctx.globalAlpha = 1.0;
            }

            var floorY = canvas.height * 0.85;

            // Update & Draw Sky Particles
            if (settings.skyMode === 'Rainbow Trail' && handRaiseTimer > 90) { // 90 frames = ~1.5 seconds
                if (gravityWells.length > 0) {
                    var well = gravityWells[0];
                    for(var i=0; i<3; i++) {
                        skyParticles.push({
                            x: well.x, y: well.y,
                            vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
                            size: Math.random() * 8 + 4,
                            alpha: 1.0, isTrail: true,
                            color: BxCM_COLORS[Math.floor(Math.random() * BxCM_COLORS.length)]
                        });
                    }
                }
            }
            
            for (var i = skyParticles.length - 1; i >= 0; i--) {
                var p = skyParticles[i];
                if (p.isTrail) {
                    p.alpha -= 0.03;
                    if(p.alpha <= 0) { skyParticles.splice(i, 1); continue; }
                } else {
                    if (settings.skyMode === 'Attractor' && gravityWells.length > 0) {
                        var well = gravityWells[0];
                        p.vx += (well.x - p.x) * 0.001;
                        p.vy += (well.y - p.y) * 0.001;
                    } else {
                        p.vx *= 0.95; p.vy *= 0.95;
                    }
                }
                p.x += p.vx; p.y += p.vy;
                ctx.globalAlpha = p.alpha || 1.0;
                ctx.fillStyle = p.color || BxCM_COLORS[0];
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }

            // Draw Floor Splatters
            ctx.globalAlpha = 1.0;
            for (var i = floorSplatter.length - 1; i >= 0; i--) {
                var s = floorSplatter[i];
                s.life -= 0.001;
                if (s.life <= 0) floorSplatter.splice(i, 1);
                else {
                    ctx.globalAlpha = s.life * 0.5;
                    ctx.fillStyle = s.color;
                    ctx.beginPath();
                    ctx.ellipse(s.x, floorY, s.radius, s.radius * 0.3, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1.0;
            
            // Draw Floor Line
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.beginPath(); ctx.moveTo(0, floorY); ctx.lineTo(canvas.width, floorY); ctx.stroke();

            // Draw Objects
            for (var i = 0; i < objects.length; i++) {
                var o = objects[i];
                if (o.growth < 1.0) o.growth += 0.05;
                
                // Physics
                o.z += o.vz; o.x += o.vx; o.y += o.vy;
                o.vy += settings.gravity * (o.type === 'leaf' ? 0.5 : 1.0);
                o.vx *= 0.98; o.vy *= 0.99; o.vz *= 0.98;

                var scale = 1.0 - (o.z * 0.8);
                var r = o.radius * scale * o.growth;

                // Floor bounce
                if (o.y + r > floorY) {
                    o.y = floorY - r;
                    o.vy *= -0.4; o.vz *= 0.8;
                }
                // Respawn
                if (o.z > 0.95 || o.x < -100 || o.x > canvas.width + 100) {
                    objects[i] = createObject(o.type);
                }

                // Draw Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                ctx.beginPath();
                ctx.ellipse(o.x, floorY + 5, r, r * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();

                // Draw Object
                ctx.save();
                ctx.translate(o.x, o.y);
                if (o.type === 'leaf') ctx.rotate(o.vx * 0.1);
                
                if (o.type === 'ball') {
                     var ballGrd = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
                    ballGrd.addColorStop(0, 'rgba(255,255,255,0.7)');
                    ballGrd.addColorStop(0.7, o.color);
                    ballGrd.addColorStop(1, o.color.replace(')',',0.7)'));
                    ctx.fillStyle = ballGrd;
                    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
                } else if (o.type === 'leaf') {
                    ctx.fillStyle = o.color;
                    ctx.fillRect(-r, -r/2, r*2, r);
                } else if (o.type === 'puddle') {
                    if (o.isSquished) o.radius -= 2;
                    if(o.radius > 0) {
                        ctx.fillStyle = o.color.replace(')',',0.7)');
                        ctx.beginPath(); ctx.ellipse(0, (floorY - o.y), r, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
                    } else { objects[i] = createObject('puddle'); }
                }
                ctx.restore();
            }
        }

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        document.addEventListener('keydown', function(e) { if (e.key.toLowerCase() === 'f') { if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); document.body.classList.add('kiosk-mode'); } else { document.exitFullscreen(); document.body.classList.remove('kiosk-mode'); } } });
    </script>
</body>
</html>
