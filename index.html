<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gentle Playroom - Evolving Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #webcam { transform: scaleX(-1); display: none; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #ffffff; z-index: 100; color: #333; text-align: center;
        }
        button {
            padding: 20px 50px; font-size: 20px; cursor: pointer; letter-spacing: 1px;
            background-color: #3498db; color: white; border: none; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); transition: 0.3s;
        }
        button:hover { background-color: #2980b9; transform: scale(1.05); }
        #log { margin-top: 20px; font-family: monospace; color: #888; }
        .dg.ac { z-index: 50 !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>
    <div id="ui">
        <h1 style="letter-spacing: 2px; font-weight: 300;">GENTLE PLAYROOM</h1>
        <p style="color: #666; margin-bottom: 30px;">Interact with a world of gentle magic.</p>
        <button onclick="startApp()">START EXPERIENCE</button>
        <div id="log">Sensors Calibrated</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <video id="webcam" playsinline autoplay muted></video>

    <script>
        var log = document.getElementById('log');
        var video = document.getElementById('webcam');
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');

        var objects = [], motionPoints = [], popExplosions = [], ripples = []; // NEW: Added ripples array
        var lastFrame = null, engineBooted = false;
        var activeInteractionMode = 'Launch'; 
        var modeNotification = { text: '', life: 0 }; 

        var settings = {
            interactionMode: 'Random', 
            objectCount: 15, // RENAMED from ballCount
            gravity: 0.2, kickPower: 8,
            bgColor: '#f9f9fb', cameraAlpha: 0.2, cameraBlur: 4,
            indicatorColor: '#ffffff', indicatorSize: 30,
        };

        function startApp() { /* (no changes) */
            log.innerText = "Initializing sensory sensors...";
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                video.srcObject = stream;
                video.play().catch(()=>{});
                var checkInterval = setInterval(() => {
                    if (video.videoWidth > 0 && !engineBooted) {
                        clearInterval(checkInterval);
                        engineBooted = true;
                        document.getElementById('ui').style.display = 'none';
                        initGame();
                    }
                }, 100);
            }).catch(err => { log.innerText = "Error: " + err.name; });
        }

        function initGame() {
            try {
                var gui = new dat.GUI();
                gui.add(settings, 'interactionMode', ['Launch', 'Pop', 'Random']).name('Ball Interaction');
                gui.add(settings, 'objectCount', 5, 30).name('Object Count').onFinishChange(resetObjects);
                gui.addColor(settings, 'bgColor').name('Room Hue');
                var mirrorFolder = gui.addFolder('Mirror Settings');
                mirrorFolder.add(settings, 'cameraAlpha', 0, 1).name('Visibility');
                mirrorFolder.add(settings, 'cameraBlur', 0, 20).name('Softness');
            } catch(e) {}

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            setInterval(cycleInteractionMode, 20000); 
            showModeChangeNotification(settings.interactionMode === 'Random' ? 'Launch' : settings.interactionMode); 

            resetObjects();
            trackMotion();
            gameLoop();
        }

        function cycleInteractionMode() { /* (no changes) */
            if (settings.interactionMode === 'Random') {
                activeInteractionMode = (activeInteractionMode === 'Launch') ? 'Pop' : 'Launch';
                showModeChangeNotification(activeInteractionMode);
            }
        }
        
        function showModeChangeNotification(mode) { /* (no changes) */
            modeNotification.text = `Ball Mode: ${mode}`;
            modeNotification.life = 1.0;
        }

        function trackMotion() {
            var mCanvas = document.createElement('canvas');
            var mCtx = mCanvas.getContext('2d', { willReadFrequently: true });
            mCanvas.width = 64; mCanvas.height = 48;

            function scan() {
                if (video.readyState < 3) { setTimeout(scan, 100); return; }
                mCtx.drawImage(video, 0, 0, 64, 48);
                var current = mCtx.getImageData(0, 0, 64, 48).data;
                motionPoints = []; 

                if (lastFrame) {
                    for (var i = 0; i < current.length; i += 4) {
                        if (Math.abs(current[i] - lastFrame[i]) > 45) {
                            var x = (1.0 - (((i/4) % 64) / 64)) * canvas.width;
                            var yPerc = (Math.floor(i/4/64))/48;
                            var y = yPerc * canvas.height;
                            motionPoints.push({ x: x, y: y });

                            // *** MODIFIED: Interaction logic for different object types ***
                            objects.forEach((obj, index) => {
                                if (!obj) return;
                                var dx = obj.x - x, dy = obj.y - y;
                                if (Math.sqrt(dx*dx + dy*dy) < (obj.radius || settings.indicatorSize) + 30) {
                                    switch(obj.type) {
                                        case 'ball':
                                            if (activeInteractionMode === 'Launch') {
                                                obj.vy = -settings.kickPower;
                                                obj.vx = (obj.x - x) * 0.15;
                                            } else { // 'Pop' mode
                                                createPopExplosion(obj.x, obj.y, obj.colorHue);
                                                objects[index] = createObject();
                                            }
                                            break;
                                        case 'leaf':
                                            // Give it a gentle push upwards and sideways
                                            obj.vy = -settings.kickPower * 0.5;
                                            obj.vx += (obj.x - x) * 0.1;
                                            break;
                                        case 'puddle':
                                            // Create a ripple effect
                                            ripples.push({x: obj.x, y: obj.y, radius: 20, life: 1.0});
                                            break;
                                    }
                                }
                            });
                        }
                    }
                }
                lastFrame = new Uint8ClampedArray(current);
                setTimeout(scan, 60);
            }
            scan();
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            
            if (settings.interactionMode !== 'Random' && activeInteractionMode !== settings.interactionMode) {
                 activeInteractionMode = settings.interactionMode;
                 showModeChangeNotification(activeInteractionMode);
            }

            ctx.fillStyle = settings.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawMirroredCamera();
            drawTouchIndicators();
            drawAndUpdateObjects(); // RENAMED from drawAndUpdateBalls
            drawAndUpdatePops();
            drawAndUpdateRipples(); // NEW
            drawNotifications();
        }

        // RENAMED from drawAndUpdateBalls
        function drawAndUpdateObjects() {
             var floorY = canvas.height * 0.85;
             objects.forEach((obj, i) => {
                if (!obj) return;
                
                // Call the correct update function based on type
                switch(obj.type) {
                    case 'ball': updateBall(obj, floorY); break;
                    case 'leaf': updateLeaf(obj, floorY); break;
                    case 'puddle': updatePuddle(obj, floorY); break;
                }

                // Call the correct draw function
                ctx.save();
                switch(obj.type) {
                    case 'ball': drawBall(obj, floorY); break;
                    case 'leaf': drawLeaf(obj, floorY); break;
                    case 'puddle': drawPuddle(obj, floorY); break;
                }
                ctx.restore();

                // Respawn logic
                if (obj.y > canvas.height + 50) {
                    objects[i] = createObject();
                }
            });
        }
        
        // --- NEW: Specific update and draw functions for each object type ---

        function updateBall(o, floorY) {
            o.vy += settings.gravity;
            o.x += o.vx; o.y += o.vy;
            o.vx *= 0.94; o.vy *= 0.94;
            if (o.y + o.radius > floorY) {
                o.y = floorY - o.radius; o.vy *= -0.4;
            }
        }
        function drawBall(o, floorY) {
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.06)';
            ctx.beginPath(); ctx.ellipse(o.x, floorY, o.radius, o.radius * 0.2, 0, 0, 2*Math.PI); ctx.fill();
            // Ball
            var grd = ctx.createRadialGradient(o.x-o.radius*0.3, o.y-o.radius*0.3, o.radius*0.1, o.x, o.y, o.radius);
            grd.addColorStop(0, `hsl(${o.colorHue}, 80%, 85%)`);
            grd.addColorStop(1, `hsl(${o.colorHue}, 70%, 40%)`);
            ctx.beginPath(); ctx.arc(o.x, o.y, o.radius, 0, 2*Math.PI); ctx.fillStyle = grd; ctx.fill();
        }

        function updateLeaf(o, floorY) {
            o.vy += settings.gravity * 0.2; // Leaves are lighter
            o.vx += (Math.random() - 0.5) * 0.2; // Add a gentle side-to-side drift
            o.x += o.vx; o.y += o.vy;
            o.vx *= 0.96; o.vy *= 0.98;
            o.rotation += o.rotationSpeed;
            if (o.y + o.radius > floorY) {
                o.y = floorY - o.radius; o.vy = 0; o.vx *= 0.8;
            }
        }
        function drawLeaf(o, floorY) {
            ctx.translate(o.x, o.y);
            ctx.rotate(o.rotation);
            ctx.fillStyle = `hsl(${o.colorHue}, 60%, 50%)`;
            ctx.beginPath();
            ctx.moveTo(0, -o.radius);
            ctx.quadraticCurveTo(o.radius, 0, 0, o.radius);
            ctx.quadraticCurveTo(-o.radius, 0, 0, -o.radius);
            ctx.fill();
        }

        function updatePuddle(o, floorY) {
            // Puddles don't move
            o.y = floorY;
        }
        function drawPuddle(o, floorY) {
            ctx.fillStyle = 'rgba(100, 150, 255, 0.3)';
            ctx.beginPath();
            ctx.ellipse(o.x, o.y, o.radius, o.radius * 0.3, 0, 0, 2 * Math.PI);
            ctx.fill();
        }

        // NEW: Function to draw the ripple animations
        function drawAndUpdateRipples() {
            for (let i = ripples.length - 1; i >= 0; i--) {
                let r = ripples[i];
                r.radius += 1.5;
                r.life -= 0.02;
                if (r.life <= 0) {
                    ripples.splice(i, 1);
                } else {
                    ctx.strokeStyle = `rgba(100, 150, 255, ${r.life * 0.5})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.ellipse(r.x, r.y, r.radius, r.radius * 0.3, 0, 0, 2 * Math.PI);
                    ctx.stroke();
                }
            }
        }
        
        // --- Utility and other drawing functions (minor changes) ---

        function resetObjects() {
            objects = [];
            for (var i = 0; i < settings.objectCount; i++) {
                objects.push(createObject());
            }
        }

        // MODIFIED: This now creates one of three types of objects
        function createObject() {
            var floorY = canvas.height * 0.85;
            var objectType = ['ball', 'leaf', 'puddle'][Math.floor(Math.random() * 3)];
            
            let newObj = {
                type: objectType,
                x: Math.random() * canvas.width,
                y: Math.random() * floorY * 0.8,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                radius: Math.random() * 20 + 30
            };

            switch(objectType) {
                case 'ball':
                    newObj.colorHue = Math.floor(Math.random() * 360);
                    break;
                case 'leaf':
                    newObj.colorHue = Math.random() * 40 + 80; // Greens and yellows
                    newObj.rotation = Math.random() * Math.PI * 2;
                    newObj.rotationSpeed = (Math.random() - 0.5) * 0.04;
                    break;
                case 'puddle':
                    newObj.y = floorY; // Puddles are always on the floor
                    newObj.radius = Math.random() * 40 + 40;
                    break;
            }
            return newObj;
        }

        function drawMirroredCamera() { /* (no changes) */
            ctx.save();
            ctx.globalAlpha = settings.cameraAlpha;
            ctx.filter = `blur(${settings.cameraBlur}px)`;
            ctx.scale(-1, 1);
            ctx.translate(-canvas.width, 0);
            if (video.readyState >= 3) ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();
        }
        function drawTouchIndicators() { /* (no changes) */
            motionPoints.forEach(p => {
                var grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, settings.indicatorSize * 1.5);
                grad.addColorStop(0, settings.indicatorColor + '66'); grad.addColorStop(1, settings.indicatorColor + '00');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x, p.y, settings.indicatorSize * 1.5, 0, 2*Math.PI); ctx.fill();
            });
        }
        function createPopExplosion(x, y, hue) { /* (no changes) */
            var numParticles = 30;
            for (let i = 0; i < numParticles; i++) {
                var angle = (i/numParticles) * 2 * Math.PI, speed = Math.random() * settings.kickPower * 0.5 + 1;
                popExplosions.push({
                    x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    life: 1.0, hue, lightness: 70 + Math.random() * 20
                });
            }
        }
        function drawAndUpdatePops() { /* (no changes) */
            for (let i = popExplosions.length - 1; i >= 0; i--) {
                let p = popExplosions[i]; p.x += p.vx; p.y += p.vy; p.vy += settings.gravity * 0.5; p.life -= 0.03;
                if (p.life <= 0) popExplosions.splice(i, 1);
                else { ctx.fillStyle = `hsla(${p.hue}, 80%, ${p.lightness}%, ${p.life})`; ctx.fillRect(p.x, p.y, 4, 4); }
            }
        }
        function drawNotifications() { /* (no changes) */
             if (modeNotification.life > 0) {
                modeNotification.life -= 0.01; ctx.save(); ctx.globalAlpha = Math.min(1, modeNotification.life * 3); 
                ctx.fillStyle = '#333333'; ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(modeNotification.text, canvas.width / 2, 50); ctx.restore();
            }
        }
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        document.addEventListener('keydown', e => { if (e.key.toLowerCase() === 'f') document.documentElement.requestFullscreen(); });
    </script>
</body>
</html>
