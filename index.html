<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pro Sensory Floor</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        body.kiosk-mode { cursor: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #webcam { display: none; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #1a1a1a; z-index: 10; color: white;
        }
        button {
            padding: 20px 40px; font-size: 24px; cursor: pointer;
            background-color: #27ae60; color: white; border: none; border-radius: 8px;
        }
        #log { margin-top: 20px; color: #777; }
        .dg.ac { z-index: 50 !important; transition: opacity 0.3s; }
        body.kiosk-mode .dg.ac { opacity: 0; pointer-events: none; }
    </style>
    <!-- DAT.GUI for the Admin Dashboard -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>PRO SENSORY FLOOR</h1>
        <p>Press 'F' after starting for Fullscreen Kiosk Mode</p>
        <button onclick="startApp()">START CAMERA</button>
        <div id="log">Waiting for Start...</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <video id="webcam" playsinline autoplay muted></video>

    <script>
        var log = document.getElementById('log');
        var video = document.getElementById('webcam');
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');

        var balls = [];
        var particles = [];
        var lastFrame = null;
        var floorLevel = 0.85;

        // --- ADMIN SETTINGS ---
        var settings = {
            activityMode: 'Ball Pit',
            gravity: 0.5,
            kickStrength: 18,
            bounce: 0.7,
            ballCount: 15,
            backgroundColor: '#1a1a1a'
        };

        // --- SETUP ---
        function startApp() {
            log.innerText = "Requesting camera...";
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    log.innerText = "Camera found! Starting...";
                    video.srcObject = stream;
                    video.onplaying = function() {
                        document.getElementById('ui').style.display = 'none';
                        initGame();
                    };
                })
                .catch(function(err) {
                    log.innerText = "Error: " + err.name;
                    log.style.color = "red";
                });
        }

        function initGame() {
            // --- Build Admin Panel ---
            try {
                var gui = new dat.GUI();
                gui.add(settings, 'activityMode', ['Ball Pit', 'Floor is Lava']).name('Activity Mode');
                var physicsFolder = gui.addFolder('Physics');
                physicsFolder.add(settings, 'gravity', 0.1, 2.0);
                physicsFolder.add(settings, 'kickStrength', 5, 30);
                physicsFolder.add(settings, 'bounce', 0.1, 1.0);
                physicsFolder.add(settings, 'ballCount', 5, 50).onFinishChange(resetBalls);
                physicsFolder.open();
                gui.addColor(settings, 'backgroundColor');
            } catch (e) {
                console.warn("dat.GUI failed to load, running without admin panel.");
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            resetBalls();
            trackMotion();
            gameLoop();
        }
        
        function resetBalls() {
            balls = [];
            for (var i = 0; i < settings.ballCount; i++) {
                balls.push(createBall());
            }
        }

        function createBall() {
            var floorY = canvas.height * floorLevel;
            return {
                x: Math.random() * canvas.width,
                y: floorY - 100 - (Math.random() * 200),
                radius: Math.random() * 25 + 25,
                vx: (Math.random() - 0.5) * 4,
                vy: 0,
                color: 'hsl(' + Math.floor(Math.random() * 360) + ', 80%, 60%)'
            };
        }

        // --- MOTION TRACKING ---
        function trackMotion() {
            var mCanvas = document.createElement('canvas');
            var mCtx = mCanvas.getContext('2d', { willReadFrequently: true });
            mCanvas.width = 64;
            mCanvas.height = 48;

            function scan() {
                mCtx.drawImage(video, 0, 0, 64, 48);
                var currentFrame = mCtx.getImageData(0, 0, 64, 48).data;

                if (lastFrame) {
                    var scanStartY = Math.floor(48 * (floorLevel - 0.2));
                    for (var y = scanStartY; y < 48; y++) {
                        for (var x = 0; x < 64; x++) {
                            var idx = (y * 64 + x) * 4;
                            if (Math.abs(currentFrame[idx] - lastFrame[idx]) > 40) {
                                var screenX = (1.0 - (x / 64)) * canvas.width;
                                var screenY = (y / 48) * canvas.height;
                                for (var b = 0; b < balls.length; b++) {
                                    var dx = balls[b].x - screenX;
                                    var dy = balls[b].y - screenY;
                                    if (Math.sqrt(dx * dx + dy * dy) < balls[b].radius + 35) {
                                        balls[b].vy = -settings.kickStrength;
                                        balls[b].vx += dx * 0.1;
                                    }
                                }
                            }
                        }
                    }
                }
                lastFrame = new Uint8ClampedArray(currentFrame);
                setTimeout(scan, 50);
            }
            scan();
        }

        // --- GAME LOOP & RENDERING ---
        function gameLoop() {
            requestAnimationFrame(gameLoop);
            ctx.fillStyle = settings.backgroundColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            var floorY = canvas.height * floorLevel;

            // Draw Floor
            if (settings.activityMode === 'Floor is Lava') {
                ctx.fillStyle = 'rgba(255, 50, 50, 0.8)';
                ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);
            }
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, floorY);
            ctx.lineTo(canvas.width, floorY);
            ctx.stroke();

            // Update & Draw Balls
            for (var i = balls.length - 1; i >= 0; i--) {
                var b = balls[i];
                b.vy += settings.gravity;
                b.x += b.vx;
                b.y += b.vy;
                b.vx *= 0.99;

                // Floor Collision
                if (b.y + b.radius > floorY) {
                    b.y = floorY - b.radius;
                    b.vy *= -settings.bounce;

                    if (settings.activityMode === 'Floor is Lava') {
                        explode(b.x, b.y, b.color);
                        balls[i] = createBall(); // Replace the exploded ball
                        continue;
                    }
                }
                if (b.x < -b.radius || b.x > canvas.width + b.radius) {
                    balls[i] = createBall(); // Respawn if off-screen
                }
                
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
            }

            // Update & Draw Particles
            for (var i = particles.length - 1; i >= 0; i--) {
                var p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.alpha -= 0.02;
                if (p.alpha <= 0) particles.splice(i, 1);
                
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.globalAlpha = 1.0;
            }
        }
        
        function explode(x, y, color) {
            for (var i = 0; i < 30; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 1.0) * 15,
                    size: Math.random() * 5 + 2,
                    color: color,
                    alpha: 1.0
                });
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    document.body.classList.add('kiosk-mode');
                } else {
                    document.exitFullscreen();
                    document.body.classList.remove('kiosk-mode');
                }
            }
        });
    </script>
</body>
</html>
