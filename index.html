<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Interactive Playroom - Dual Zone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; font-family: sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #webcam { display: none; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #ffffff; z-index: 100; color: #333; text-align: center;
        }
        button {
            padding: 20px 50px; font-size: 20px; cursor: pointer; letter-spacing: 1px;
            background-color: #e74c3c; color: white; border: none; border-radius: 5px;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); transition: 0.3s;
        }
        button:hover { background-color: #c0392b; transform: scale(1.05); }
        #log { margin-top: 20px; font-family: monospace; color: #888; }
        
        .dg.ac { z-index: 50 !important; }
        body.kiosk-mode { cursor: none; }
        body.kiosk-mode .dg.ac { opacity: 0; pointer-events: none; }
    </style>
    <!-- Admin Board -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1 style="letter-spacing: 2px; font-weight: 300;">INTERACTIVE PLAYROOM</h1>
        <p style="color: #666; margin-bottom: 30px;">Hold hands high to attract the sky. Kick low to play.</p>
        <button onclick="startApp()">START EXPERIENCE</button>
        <div id="log">Sensors Ready</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <video id="webcam" playsinline autoplay muted></video>

    <script>
        var log = document.getElementById('log');
        var video = document.getElementById('webcam');
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');

        var objects = [];
        var skyParticles = []; // The "stars"
        var floorSplatter = []; // Paint left on the floor
        var lastFrame = null;
        var engineBooted = false;

        // Gravity Wells (The hands held up in the sky)
        var gravityWells = [];

        // --- CUSTOMIZABLE SETTINGS ---
        var settings = {
            gravity: 0.5,
            kickPower: 22,
            ballCount: 8,
            puddleCount: 4,
            bgColor: '#f0f4f8', // Soft realistic white/grey
            skyParticleColor: '#3498db'
        };

        // --- 1. CAMERA STARTUP ---
        function startApp() {
            log.innerText = "Requesting camera...";
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    log.innerText = "Camera connected. Booting...";
                    video.srcObject = stream;
                    video.play().catch(function(){});

                    var checkInterval = setInterval(function() {
                        if (video.readyState >= 3 && !engineBooted) { 
                            clearInterval(checkInterval);
                            engineBooted = true;
                            document.getElementById('ui').style.opacity = '0';
                            setTimeout(function() { document.getElementById('ui').style.display = 'none'; }, 500);
                            initGame();
                        }
                    }, 100);
                })
                .catch(function(err) {
                    log.innerText = "CAMERA ERROR: " + err.name;
                    log.style.color = "red";
                });
        }

        // --- 2. GAME ENGINE & ADMIN ---
        function initGame() {
            try {
                var gui = new dat.GUI();
                gui.addColor(settings, 'bgColor').name('Room Color');
                gui.addColor(settings, 'skyParticleColor').name('Sky Particle Color');
                gui.add(settings, 'kickPower', 10, 40).name('Kick Strength');
                gui.add(settings, 'ballCount', 0, 20).onFinishChange(resetObjects);
                gui.add(settings, 'puddleCount', 0, 10).onFinishChange(resetObjects);
            } catch(e) {}

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Create "Sky Particles" (Stars/Leaves/Dust)
            for(var i=0; i<150; i++) {
                skyParticles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: Math.random() * 4 + 2,
                    vx: (Math.random() - 0.5),
                    vy: (Math.random() - 0.5),
                    baseSpeed: Math.random() * 0.5 + 0.1
                });
            }

            resetObjects();
            trackMotion();
            gameLoop();
        }

        function resetObjects() {
            objects = [];
            for (var i = 0; i < settings.ballCount; i++) objects.push(createObject('ball'));
            for (var i = 0; i < settings.puddleCount; i++) objects.push(createObject('puddle'));
        }

        function createObject(type) {
            var floor = canvas.height * 0.85;
            return {
                type: type,
                x: Math.random() * canvas.width,
                y: floor - 20,
                z: 0,
                radius: type === 'ball' ? Math.random() * 25 + 35 : 30, // Puddles are flat
                vx: (Math.random() - 0.5) * 3,
                vy: 0, vz: 0,
                colorHue: Math.floor(Math.random() * 360), // Store hue for realistic shading
                growth: 0.1,
                isSquished: false
            };
        }

        // --- 3. DUAL-ZONE MOTION TRACKING ---
        function trackMotion() {
            var mCanvas = document.createElement('canvas');
            var mCtx = mCanvas.getContext('2d', { willReadFrequently: true });
            mCanvas.width = 64; mCanvas.height = 48;

            function scan() {
                if (video.readyState < 3) { setTimeout(scan, 100); return; }
                
                mCtx.drawImage(video, 0, 0, 64, 48);
                var current = mCtx.getImageData(0, 0, 64, 48).data;
                
                gravityWells = []; // Reset hand attractors every frame

                if (lastFrame) {
                    for (var i = 0; i < current.length; i += 4) {
                        if (Math.abs(current[i] - lastFrame[i]) > 40) { // Motion detected
                            var x = (1.0 - ((i / 4) % 64) / 64) * canvas.width;
                            var yPerc = (Math.floor(i / 4 / 64)) / 48;
                            var y = yPerc * canvas.height;
                            
                            // ZONE 1: THE SKY (Top 60% of screen)
                            if (yPerc < 0.6) {
                                // If a kid waves high, create a gravity well
                                // We push it if it's new, or average it if it's close to an existing one
                                var added = false;
                                for (var w=0; w<gravityWells.length; w++) {
                                    var dist = Math.abs(gravityWells[w].x - x);
                                    if (dist < 100) {
                                        gravityWells[w].power += 0.1; // Make attraction stronger
                                        added = true; break;
                                    }
                                }
                                if (!added && gravityWells.length < 3) { // Max 3 hands tracked
                                    gravityWells.push({x: x, y: y, power: 1.0});
                                }
                            }
                            
                            // ZONE 2: THE FLOOR (Bottom 30% of screen)
                            if (yPerc > 0.7) {
                                objects.forEach(function(obj) {
                                    var dx = obj.x - x;
                                    var dy = obj.y - y;
                                    if (Math.sqrt(dx * dx + dy * dy) < obj.radius + 60) {
                                        if (obj.type === 'ball') {
                                            obj.vz = 0.06; // Kick deep
                                            obj.vy = -settings.kickPower * 0.6;
                                            obj.vx = (obj.x - x) * 0.4;
                                        } else if (obj.type === 'puddle' && !obj.isSquished) {
                                            // Step on a paint puddle
                                            obj.isSquished = true;
                                            obj.vx = 0; obj.vy = 0;
                                            createFloorSplatter(obj.x, obj.y, obj.colorHue);
                                        }
                                    }
                                });
                            }
                        }
                    }
                }
                lastFrame = new Uint8ClampedArray(current);
                setTimeout(scan, 50);
            }
            scan();
        }

        // --- 4. VISUAL EFFECTS ---
        function createFloorSplatter(x, y, hue) {
            for (var i = 0; i < 5; i++) {
                floorSplatter.push({
                    x: x + (Math.random() - 0.5) * 60,
                    y: y + (Math.random() - 0.5) * 20,
                    radius: Math.random() * 15 + 5,
                    color: 'hsla(' + hue + ', 80%, 50%, 0.8)',
                    life: 1.0 // Slowly fades into the white floor
                });
            }
        }

        // --- 5. MAIN RENDER LOOP ---
        function gameLoop() {
            requestAnimationFrame(gameLoop);
            
            // Draw Realistic Room Background
            ctx.fillStyle = settings.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw a subtle "horizon/wall" gradient
            var grd = ctx.createLinearGradient(0, canvas.height*0.85, 0, 0);
            grd.addColorStop(0, "rgba(0,0,0,0.05)");
            grd.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, canvas.width, canvas.height*0.85);

            var floorY = canvas.height * 0.85;

            // Update & Draw Sky Particles (The Stars)
            ctx.fillStyle = settings.skyParticleColor;
            skyParticles.forEach(function(p) {
                // Default drifting
                p.x += p.vx * p.baseSpeed;
                p.y += p.vy * p.baseSpeed;
                
                // GRAVITY WELL ATTRACTION (If hands are up)
                if (gravityWells.length > 0) {
                    var closestWell = gravityWells[0];
                    var shortestDist = 9999;
                    gravityWells.forEach(function(w) {
                        var d = Math.sqrt(Math.pow(w.x - p.x, 2) + Math.pow(w.y - p.y, 2));
                        if (d < shortestDist) { shortestDist = d; closestWell = w; }
                    });

                    // Pull toward hand
                    if (shortestDist < 400) {
                        p.vx += (closestWell.x - p.x) * 0.002 * closestWell.power;
                        p.vy += (closestWell.y - p.y) * 0.002 * closestWell.power;
                    }
                } else {
                    // Friction to return to slow drift
                    p.vx *= 0.95; p.vy *= 0.95;
                    p.vx += (Math.random() - 0.5) * 0.1;
                    p.vy += (Math.random() - 0.5) * 0.1;
                }

                // Wrap around screen
                if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Floor Splatters
            for (var i = floorSplatter.length - 1; i >= 0; i--) {
                var s = floorSplatter[i];
                s.life -= 0.002; // Fades out slowly
                if (s.life <= 0) floorSplatter.splice(i, 1);
                else {
                    ctx.globalAlpha = s.life;
                    ctx.fillStyle = s.color;
                    ctx.beginPath();
                    // Squished oval shape
                    ctx.ellipse(s.x, floorY + (s.y - floorY)*0.3, s.radius, s.radius * 0.3, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1.0;

            // Draw Floor Line
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, floorY); ctx.lineTo(canvas.width, floorY); ctx.stroke();

            // Update & Draw Objects (Balls and Puddles)
            for (var i = 0; i < objects.length; i++) {
                var o = objects[i];
                
                if (o.growth < 1.0 && !o.isSquished) o.growth += 0.05;

                // Physics (Balls only)
                if (o.type === 'ball') {
                    o.z += o.vz; o.x += o.vx; o.y += o.vy; o.vy += settings.gravity;
                    var scale = 1.0 - (o.z * 0.8);
                    var currentRadius = o.radius * scale * o.growth;

                    // Bounce
                    if (o.y + currentRadius > floorY) {
                        o.y = floorY - currentRadius;
                        o.vy *= -0.65; o.vz *= 0.8;
                    }

                    // Respawn
                    if (o.z > 0.95 || o.x < -100 || o.x > canvas.width + 100) {
                        objects[i] = createObject('ball');
                        objects[i].growth = 0;
                    }

                    // Realistic Ball Shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    ctx.beginPath();
                    var shadowScale = 1.0 - Math.min((floorY - o.y) / 200, 0.8); // Shadow gets smaller when ball is high
                    ctx.ellipse(o.x, floorY + 10, currentRadius * shadowScale, currentRadius * 0.2 * shadowScale, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Realistic 3D Ball Rendering (Radial Gradient)
                    var ballGrd = ctx.createRadialGradient(
                        o.x - currentRadius * 0.3, o.y - currentRadius * 0.3, currentRadius * 0.1, // Highlight source
                        o.x, o.y, currentRadius // Shadow edge
                    );
                    ballGrd.addColorStop(0, 'hsl(' + o.colorHue + ', 80%, 80%)'); // Light spot
                    ballGrd.addColorStop(0.7, 'hsl(' + o.colorHue + ', 80%, 50%)'); // Main color
                    ballGrd.addColorStop(1, 'hsl(' + o.colorHue + ', 80%, 30%)'); // Dark edge

                    ctx.beginPath();
                    ctx.arc(o.x, o.y, currentRadius, 0, Math.PI * 2);
                    ctx.fillStyle = ballGrd;
                    ctx.fill();
                } 
                // Puddle rendering
                else if (o.type === 'puddle') {
                    if (o.isSquished) {
                        o.radius -= 1; // Shrink away
                        if (o.radius <= 0) objects[i] = createObject('puddle');
                    } else {
                        // Un-squished puddle shadow
                        ctx.fillStyle = 'rgba(0,0,0,0.1)';
                        ctx.beginPath();
                        ctx.ellipse(o.x, floorY, o.radius * o.growth, o.radius * o.growth * 0.3, 0, 0, Math.PI * 2);
                        ctx.fill();

                        // Puddle color
                        ctx.fillStyle = 'hsla(' + o.colorHue + ', 80%, 50%, 0.8)';
                        ctx.beginPath();
                        ctx.ellipse(o.x, floorY - 2, o.radius * o.growth, o.radius * o.growth * 0.3, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    document.body.classList.add('kiosk-mode');
                } else {
                    document.exitFullscreen();
                    document.body.classList.remove('kiosk-mode');
                }
            }
        });
    </script>
</body>
</html>
