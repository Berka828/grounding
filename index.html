<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Ball Pit - Bronx Children's Museum</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        canvas { display: block; }
        #webcam { display: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #111; z-index: 100; color: white; text-align: center;
        }
        button {
            padding: 25px 60px; font-size: 28px; cursor: pointer;
            background: #27ae60; color: white; border: none; border-radius: 50px;
        }
        #log {
            margin-top: 30px; font-family: monospace; font-size: 16px;
            color: #777; background: #000; padding: 20px; border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>DIGITAL BALL PIT</h1>
        <p>Step on or kick the balls at the bottom of the screen.</p>
        <button id="startBtn">START</button>
        <div id="log">System Ready. Click START to activate camera.</div>
    </div>
    <canvas id="mainCanvas"></canvas>
    <video id="webcam" playsinline autoplay muted></video>

    <script>
        const startBtn = document.getElementById('startBtn');
        const logBox = document.getElementById('log');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let balls = [];
        let lastFrame;
        const NUM_BALLS = 15;
        const FLOOR_PERCENT = 0.9; // 90% down the screen is the "floor"

        // This function is the only thing that runs when you click.
        startBtn.addEventListener('click', () => {
            logBox.innerHTML = "> Button clicked. Checking for camera...";

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                logBox.innerHTML = "<span style='color:red'>> FATAL ERROR: This browser does not support the Camera API.</span>";
                return;
            }

            // Use the simple, proven camera request.
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    logBox.innerHTML = "<span style='color:lime'>> Camera found! Attaching stream...</span>";
                    video.srcObject = stream;

                    // Wait for the video to actually start playing before we do anything else.
                    video.addEventListener('playing', () => {
                        logBox.innerHTML = "<span style='color:lime'>> Video stream active. Starting the experience!</span>";
                        const overlay = document.getElementById('overlay');
                        overlay.style.transition = 'opacity 0.5s';
                        overlay.style.opacity = '0';
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            runExperience();
                        }, 500);
                    });

                    video.play().catch(e => {
                        logBox.innerHTML = `<span style='color:red'>> ERROR: Could not play video. ${e.message}</span>`;
                    });
                })
                .catch(err => {
                    logBox.innerHTML = `<span style='color:red'>> CAMERA FAILED: ${err.name}. Check browser permissions.</span>`;
                });
        });

        // Ball object with simple physics
        class Ball {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 30 + 30; // 30px to 60px radius
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = 0;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.mass = this.radius;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.vy += 0.8; // Gravity
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98; // Friction

                // Floor collision
                const floor = canvas.height * FLOOR_PERCENT;
                if (this.y + this.radius > floor) {
                    this.y = floor - this.radius;
                    this.vy *= -0.6; // Bounce
                }
            }
        }

        // Main experience logic
        function runExperience() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Create the balls
            const floorY = canvas.height * FLOOR_PERCENT;
            for (let i = 0; i < NUM_BALLS; i++) {
                balls.push(new Ball(Math.random() * canvas.width, floorY - 60));
            }

            trackFloorMotion();
            animate();
        }

        // Motion tracking focused ONLY on the floor
        function trackFloorMotion() {
            const motionCanvas = document.createElement('canvas');
            const motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
            motionCanvas.width = 80;
            motionCanvas.height = 60;

            function process() {
                // Draw webcam to hidden canvas
                motionCtx.drawImage(video, 0, 0, 80, 60);
                const currentFrame = motionCtx.getImageData(0, 0, 80, 60);

                if (lastFrame) {
                    const floorScanStart = Math.floor(60 * (FLOOR_PERCENT - 0.2)); // Start scan slightly above floor
                    for (let y = floorScanStart; y < 60; y++) {
                        for (let x = 0; x < 80; x++) {
                            const i = (y * 80 + x) * 4;
                            const diff = Math.abs(currentFrame.data[i] - lastFrame.data[i]);

                            if (diff > 50) { // If motion is detected...
                                const canvasX = (1 - (x / 80)) * canvas.width; // Mirrored X
                                const canvasY = (y / 60) * canvas.height;
