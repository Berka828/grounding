<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bronx Riverbank 3D Floor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        body.kiosk-mode { cursor: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #webcam { display: none; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #0a0a0a; z-index: 10; color: white; transition: opacity 0.5s;
        }
        button {
            padding: 25px 60px; font-size: 24px; cursor: pointer;
            background-color: #3498db; color: white; border: none; border-radius: 60px;
        }
        #log { margin-top: 20px; color: #aaa; font-family: monospace; }
        .dg.ac { z-index: 50 !important; }
        body.kiosk-mode .dg.ac { opacity: 0; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
