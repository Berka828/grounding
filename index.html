<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gentle Playroom - Sensory Soft-Launch</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #webcam { transform: scaleX(-1); display: none; } /* Mirrored and hidden */
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #ffffff; z-index: 100; color: #333; text-align: center;
        }
        button {
            padding: 20px 50px; font-size: 20px; cursor: pointer; letter-spacing: 1px;
            background-color: #3498db; color: white; border: none; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); transition: 0.3s;
        }
        button:hover { background-color: #2980b9; transform: scale(1.05); }
        #log { margin-top: 20px; font-family: monospace; color: #888; }
        
        .dg.ac { z-index: 50 !important; }
        body.kiosk-mode { cursor: none; }
        body.kiosk-mode .dg.ac { opacity: 0; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1 style="letter-spacing: 2px; font-weight: 300;">GENTLE PLAYROOM</h1>
        <p style="color: #666; margin-bottom: 30px;">Slow and gentle movements create the best magic.</p>
        <button onclick="startApp()">START EXPERIENCE</button>
        <div id="log">Sensors Calibrated</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <video id="webcam" playsinline autoplay muted></video>

    <script>
        var log = document.getElementById('log');
        var video = document.getElementById('webcam');
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');

        var objects = [];
        var skyParticles = []; 
        var lastFrame = null;
        var engineBooted = false;
        var gravityWells = [];

        // --- GENTLE SETTINGS ---
        var settings = {
            gravity: 0.2,        // Very light gravity for slow falling
            kickPower: 8,        // Significantly reduced from 22
            flightSpeed: 0.02,   // Speed of the "3D" travel
            airDrag: 0.94,       // High air resistance to slow things down
            ballCount: 7,
            bgColor: '#f9f9fb',
            particleColor: '#aab7c4',
            cameraAlpha: 0.2,    // Controls transparency of the camera feed
            cameraBlur: 4        // Controls the blurriness of the camera feed
        };

        function startApp() {
            log.innerText = "Initializing sensory sensors...";
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    video.srcObject = stream;
                    video.play().catch(function(){});
                    var checkInterval = setInterval(function() {
                        if (video.videoWidth > 0 && !engineBooted) { 
                            clearInterval(checkInterval);
                            engineBooted = true;
                            document.getElementById('ui').style.display = 'none';
                            initGame();
                        }
                    }, 100);
                })
                .catch(function(err) { log.innerText = "Error: " + err.name; });
        }

        function initGame() {
            try {
                var gui = new dat.GUI();
                gui.add(settings, 'kickPower', 2, 15).name('Gentle Kick Force');
                gui.add(settings, 'flightSpeed', 0.005, 0.05).name('Flight Slow-Mo');
                gui.add(settings, 'gravity', 0.05, 0.5).name('Floatiness');
                gui.addColor(settings, 'bgColor').name('Room Hue');
                gui.add(settings, 'cameraAlpha', 0, 1).name('Mirror Visibility');
                gui.add(settings, 'cameraBlur', 0, 20).name('Mirror Softness');

            } catch(e) {}

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            for(var i=0; i<100; i++) {
                skyParticles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: Math.random() * 3 + 1,
                    vx: 0, vy: 0,
                    baseSpeed: Math.random() * 0.2 + 0.05
                });
            }

            resetObjects();
            trackMotion();
            gameLoop();
        }

        function resetObjects() {
            objects = [];
            for (var i = 0; i < settings.ballCount; i++) objects.push(createObject('ball'));
        }

        function createObject(type) {
            var floor = canvas.height * 0.85;
            return {
                type: type,
                x: Math.random() * canvas.width,
                y: floor - 40,
                z: 0,
                radius: Math.random() * 20 + 40,
                vx: 0, vy: 0, vz: 0,
                targetVx: 0, targetVy: 0,
                colorHue: Math.floor(Math.random() * 360),
                growth: 0.1
            };
        }

        function trackMotion() {
            var mCanvas = document.createElement('canvas');
            var mCtx = mCanvas.getContext('2d', { willReadFrequently: true });
            mCanvas.width = 64; mCanvas.height = 48;

            function scan() {
                if (video.readyState < 3) { setTimeout(scan, 100); return; }
                mCtx.drawImage(video, 0, 0, 64, 48);
                var current = mCtx.getImageData(0, 0, 64, 48).data;
                gravityWells = [];

                if (lastFrame) {
                    for (var i = 0; i < current.length; i += 4) {
                        if (Math.abs(current[i] - lastFrame[i]) > 45) {
                            var x = ( (i/4)%64 / 64) * canvas.width; // Un-mirrored for motion tracking logic
                            var yPerc = (Math.floor(i/4/64))/48;
                            var y = yPerc * canvas.height;
                            
                            // SKY ZONE
                            if (yPerc < 0.5) gravityWells.push({x: x, y: y});
                            
                            // FLOOR ZONE
                            if (yPerc > 0.75) {
                                objects.forEach(function(obj) {
                                    var dx = obj.x - x;
                                    var dy = obj.y - y;
                                    if (Math.sqrt(dx*dx + dy*dy) < obj.radius + 40) {
                                        obj.vz = settings.flightSpeed; 
                                        obj.vy = -settings.kickPower;
                                        obj.vx = (obj.x - x) * 0.15;
                                    }
                                });
                            }
                        }
                    }
                }
                lastFrame = new Uint8ClampedArray(current);
                setTimeout(scan, 60);
            }
            scan();
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            
            // Background
            ctx.fillStyle = settings.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- NEW: Draw Mirrored Camera Feed ---
            if (video.readyState >= 3) {
                ctx.save();
                ctx.globalAlpha = settings.cameraAlpha;
                ctx.filter = `blur(${settings.cameraBlur}px)`;
                // Flip the canvas horizontally to create a mirror effect
                ctx.scale(-1, 1);
                ctx.translate(-canvas.width, 0);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
            // --- End of New Code ---

            var floorY = canvas.height * 0.85;

            // Update Sky
            ctx.fillStyle = settings.particleColor;
            skyParticles.forEach(function(p) {
                p.x += p.vx; p.y += p.vy;
                if (gravityWells.length > 0) {
                    var w = gravityWells[0];
                    p.vx += (w.x - p.x) * 0.001;
                    p.vy += (w.y - p.y) * 0.001;
                } else {
                    p.vx *= 0.98; p.vy *= 0.98;
                    p.vx += (Math.random()-0.5)*0.05;
                    p.vy += (Math.random()-0.5)*0.05;
                }
                if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });

            // Update Balls (rest of the function is the same)
            objects.forEach(function(o, i) {
                if (o.growth < 1.0) o.growth += 0.02;
                o.x += o.vx; o.y += o.vy; o.z += o.vz;
                o.vy += settings.gravity;
                o.vx *= settings.airDrag; o.vy *= settings.airDrag;
                var scale = (1.0 - (o.z * 0.75)) * o.growth;
                var r = o.radius * scale;
                if (o.y + r > floorY) {
                    o.y = floorY - r;
                    o.vy *= -0.5;
                    o.vz *= 0.5;
                }
                if (o.z > 0.9 || o.x < -100 || o.x > canvas.width + 100) {
                    objects[i] = createObject('ball');
                    objects[i].growth = 0;
                }
                ctx.fillStyle = 'rgba(0,0,0,0.06)';
                ctx.beginPath();
                ctx.ellipse(o.x, floorY, r, r * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                var grd = ctx.createRadialGradient(o.x - r*0.3, o.y - r*0.3, r*0.1, o.x, o.y, r);
                grd.addColorStop(0, 'hsl('+o.colorHue+', 80%, 85%)');
                grd.addColorStop(0.6, 'hsl('+o.colorHue+', 75%, 60%)');
                grd.addColorStop(1, 'hsl('+o.colorHue+', 70%, 40%)');
                ctx.beginPath();
                ctx.arc(o.x, o.y, r, 0, Math.PI * 2);
                ctx.fillStyle = grd;
                ctx.fill();
            });
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'f') document.documentElement.requestFullscreen();
        });
    </script>
</body>
</html>
